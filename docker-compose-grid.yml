# Selenium Grid 4 for local testing of the framework's remote path.
#
# Start:  docker compose -f docker-compose-grid.yml up -d
# Console: http://localhost:4444  (shows registered nodes and live sessions)
# Stop:   docker compose -f docker-compose-grid.yml down
#
# Then run UI tests against it:
#   mvn clean test -pl framework-tests -am \
#       -Dcucumber.filter.tags="@ui" \
#       -Dui.grid.enabled=true \
#       -Dui.grid.url=http://localhost:4444/wd/hub \
#       -Dui.browser=chrome
#
# This is the Grid infrastructure for Phase 8. Containerizing the test runner
# itself is Phase 9.

services:
  selenium-hub:
    image: selenium/hub:4.32
    container_name: selenium-hub
    ports:
      - "4442:4442"   # event bus publish
      - "4443:4443"   # event bus subscribe
      - "4444:4444"   # hub / RemoteWebDriver endpoint + console

  chrome:
    image: selenium/node-chromium:4.32
    depends_on:
      - selenium-hub
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=4
    shm_size: 2gb   # Chrome needs more /dev/shm than the container default

  firefox:
    image: selenium/node-firefox:4.32
    depends_on:
      - selenium-hub
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=4
    shm_size: 2gb
