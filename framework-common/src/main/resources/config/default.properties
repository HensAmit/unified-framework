# =============================================================================
# Default configuration - values that don't change per environment.
# Loaded last; overridden by ${env}.properties and system properties.
# =============================================================================

# --- Spotify API (read/write) ---
api.base.url=https://api.spotify.com/v1
api.auth.token.url=https://accounts.spotify.com/api/token
api.auth.type=oauth2
api.default.timeout.ms=5000

# --- UI (SauceDemo) ---
ui.base.url=https://www.saucedemo.com
ui.browser=chrome
ui.headless=false
ui.timeout.explicit.ms=10000
ui.timeout.pageload.ms=30000

# Selenium Grid: disabled by default (runs a local browser). Set ui.grid.enabled=true
# to run against a remote Grid hub at ui.grid.url.
ui.grid.enabled=false
ui.grid.url=http://localhost:4444/wd/hub

# --- Cross-cutting ---
retry.count=2

# Credentials are intentionally NOT defined here. Supply at runtime via -D:
#
#   Client credentials flow (read endpoints):
#     -Dapi.auth.client.id=...   -Dapi.auth.client.secret=...
#
#   Authorization Code / refresh-token flow (@userAuth write scenarios):
#     -Dapi.auth.refresh.token=...   -Dapi.user.id=...
#
# SauceDemo uses fixed public demo credentials (standard_user / secret_sauce),
# which are test data, not secrets - they may live in the feature/test layer.
