# =============================================================================
# Default configuration - values that don't change per environment.
# Loaded last; overridden by ${env}.properties and system properties.
# =============================================================================

# Spotify API endpoints - same for all environments
api.base.url=https://api.spotify.com/v1
api.auth.token.url=https://accounts.spotify.com/api/token
api.auth.type=oauth2

# Sensible default timeouts
api.default.timeout.ms=5000
retry.count=2

# Credentials are intentionally NOT defined here.
# They MUST be supplied at runtime via:
#   -Dapi.auth.client.id=...
#   -Dapi.auth.client.secret=...
# Or via environment variables in CI.
